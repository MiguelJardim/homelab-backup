services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: container:app-gluetun
    env_file:
      - .env
      - ../.env.global
    volumes:
      - ./appdata:/config
      - ./downloads:/downloads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M