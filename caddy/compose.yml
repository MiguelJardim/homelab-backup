services:
  # Caddy Proxy with Tailscale nginx-auth forward auth
  caddy:
    image: ${IMAGE_URL:-caddy:latest}
    container_name: app-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    networks:
      - caddy-network

volumes:
  caddy_data:
  caddy_config:

networks:
  caddy-network:
    driver: bridge
