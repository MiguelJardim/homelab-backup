services:
  # Tailscale Sidecar for authentication
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale-caddy
    restart: always
    hostname: ${SERVICE:-caddy}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
    volumes:
      - ./ts/state:/var/lib/tailscale
      - ./ts/tmp:/tmp
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s

  # Caddy Proxy with Tailscale forward auth
  caddy:
    image: ${IMAGE_URL:-caddy:latest}
    container_name: app-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs
      - caddy_data:/data
      - caddy_config:/config
      - tailscale-socket:/var/run/tailscale
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      tailscale:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "caddy"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - caddy-network

volumes:
  caddy_data:
  caddy_config:
  tailscale-socket:
    driver: local

networks:
  caddy-network:
    driver: bridge
