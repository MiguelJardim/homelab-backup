services:
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    ports:
      - '3552:3552'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - arcane-data:/app/data
      - /opt/docker:/opt/docker
    env_file:
      - .env
      - ../.env.global
    restart: unless-stopped

networks:
  default:
    name: arcane_default

volumes:
  arcane-data:
    name: arcane_arcane-data