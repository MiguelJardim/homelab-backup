services:
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    ports:
      - '3552:3552'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - arcane-data:/app/data
      - /opt/docker:/opt/docker
    env_file:
      - ../.env.global
    environment:
      - APP_URL=https://arcane.${DOMAIN}
      - TRUST_PROXY=true
      - PUBLIC_URL=https://arcane.${DOMAIN}
      - PUID=${PUID}
      - PGID=${PGID}
      - ENCRYPTION_KEY=yN7z9hlKBRA2QjEFcSxZUjrR2LbRpWUNPcmMw1eopp8=
      - JWT_SECRET=kz8WAntoyoGjo3s6TXlu9OdstkGFeg7cbrJSg2xiHbs=
    restart: unless-stopped

networks:
  default:
    name: arcane_default

volumes:
  arcane-data:
    name: arcane_arcane-data