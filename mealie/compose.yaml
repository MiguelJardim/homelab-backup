services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.9.2
    container_name: mealie
    restart: always
    ports:
      - "9925:9000"
    env_file:
      - .env
      - ../.env.global
    volumes:
      - mealie-data:/app/data/
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: postgres
    image: postgres:17
    restart: always
    volumes:
      - mealie-pgdata:/var/lib/postgresql/data
    env_file:
      - .env
      - ../.env.global
    environment:
      PGUSER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  mealie-data:
  mealie-pgdata:
