# ============================================================================
# COMMON PATTERNS REFERENCE
# ============================================================================
# 
# RESTART POLICIES:
#   - unless-stopped: Restart unless explicitly stopped (most common)
#   - always: Always restart, even after manual stop
#   - on-failure: Only restart on failure
# 
# VOLUME TYPES:
#   - ./relative/path:/container/path  # Bind mount (relative to compose file)
#   - /absolute/path:/container/path   # Bind mount (absolute path)
#   - volume-name:/container/path      # Named volume (managed by Docker)
# 
# ENVIRONMENT VARIABLES:
#   - TZ=${TZ}  # Always include timezone
#   - PUID=${PUID} / PGID=${PGID}  # Only for LinuxServer.io images
#   - user: "${PUID}:${PGID}"  # Alternative to PUID/PGID env vars
# 
# CADDY LABELS:
#   - caddy: subdomain.${DOMAIN}  # Subdomain (from .env.global)
#   - caddy.reverse_proxy: "{{upstreams CONTAINER_PORT}}"  # Container port, not host!
#   - caddy.tls: "${CADDY_CERT_PATH} ${CADDY_CERT_KEY_PATH}"  # TLS certs
# 
# NETWORKS:
#   - caddy-proxy: External network for reverse proxy (always external: true)
#   - default: Internal network for multi-service communication
# 
# HEALTHCHECKS:
#   - Recommended for critical services
#   - Use service-specific health endpoints
#   - Adjust intervals/timeouts based on service startup time
# 
# DEPENDENCIES:
#   - depends_on: Ensures order but doesn't wait for health
#   - depends_on with condition: service_healthy (waits for healthcheck)
# 
# ============================================================================

