# Docker Compose Template
# This template aggregates common patterns from all services in this homelab
# Copy and customize as needed for new services

# ============================================================================
# BASIC SERVICE TEMPLATE (Most Common Pattern)
# ============================================================================
# Use this for simple services that need Caddy reverse proxy

name: service-name  # Optional: project name

services:
  service-name:
    image: image-name:tag
    container_name: service-name
    restart: unless-stopped  # Options: unless-stopped, always, on-failure
    
    # Port mappings (optional if using Caddy proxy)
    # Format: "HOST_PORT:CONTAINER_PORT"
    ports:
      - "8080:8080"  # Remove if only accessing via Caddy
    
    # Volumes
    volumes:
      - ./data:/app/data  # Service-specific data
      - ./config:/config   # Service-specific config
      # - /opt/docker:/opt/docker  # If you need access to all docker projects
    
    # Global environment variables (loads from .env.global)
    env_file:
      - .env  # Service-specific .env
      - ../.env.global
    
    # Service-specific environment variables
    environment:
      - TZ=${TZ}  # Timezone (from .env.global)
      # - PUID=${PUID}  # Only for LinuxServer.io images
      # - PGID=${PGID}   # Only for LinuxServer.io images
      # - APP_URL=https://service-name.${DOMAIN}  # If service needs to know its URL
      # - TRUST_PROXY=true  # If service is behind reverse proxy
    
    # Alternative to PUID/PGID env vars (use one or the other)
    # user: "${PUID}:${PGID}"
    
    # Healthcheck (optional, recommended for critical services)
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s
    
    # Caddy reverse proxy configuration
    networks:
      - caddy-proxy
    labels:
      caddy: service-name.${DOMAIN}  # Subdomain (from .env.global)
      caddy.reverse_proxy: "{{upstreams 8080}}"  # Container port (not host port!)
      caddy.tls: "${CADDY_CERT_PATH} ${CADDY_CERT_KEY_PATH}"  # TLS certs (from .env.global)

networks:
  caddy-proxy:
    external: true

# Optional: Named volumes (for data persistence)
# volumes:
#   service-data:


