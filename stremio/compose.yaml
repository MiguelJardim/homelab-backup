services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: stremio-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8080:8080/tcp
    volumes:
      - ./gluetun-data:/gluetun
    env_file:
      - .env
      - ../.env.global
      - ../.env.vpn
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_CITIES=${SERVER_CITIES}
      - TZ=${TZ}
      - UPDATER_PERIOD=${UPDATER_PERIOD}
      - FIREWALL=${FIREWALL}
      - FIREWALL_OUTBOUND_SUBNETS=${FIREWALL_OUTBOUND_SUBNETS}
      - FIREWALL_INPUT_PORTS=${FIREWALL_INPUT_PORTS}
      - FIREWALL_VPN_INPUT_PORTS=${FIREWALL_VPN_INPUT_PORTS}
      # Fix MTU discovery error by setting a fixed MTU
      - OPENVPN_MSSFIX=${OPENVPN_MSSFIX}
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    restart: unless-stopped
    networks:
      - default
    # Memory limit: 256MB - Gluetun is lightweight
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  stremio:
    image: tsaridas/stremio-docker:latest
    container_name: stremio
    network_mode: service:gluetun
    env_file:
      - .env
      - ../.env.global
    environment:
      - NO_CORS=${NO_CORS}
      - SERVER_URL=${SERVER_URL}
      - CASTING_DISABLED=${CASTING_DISABLED}
    volumes:
      - ./stremio-data:/root/.stremio-server
    restart: unless-stopped
    # Memory limit: 1GB - Stremio can use significant RAM during transcoding
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 128M
    # Ensure Gluetun is healthy before starting
    depends_on:
      gluetun:
        condition: service_healthy

networks:
  default:
    name: stremio_default