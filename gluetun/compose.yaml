services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: app-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8080:8080/tcp
      - 8083:8083/tcp
      - 6881:6881/tcp
      - 6881:6881/udp
    volumes:
      - ./gluetun-data:/gluetun
    env_file:
      - .env
      - ../.env.global
      - ../.env.vpn
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    restart: unless-stopped
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

networks:
  default:
    name: gluetun_default
